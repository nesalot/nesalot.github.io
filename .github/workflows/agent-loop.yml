name: Agent Loop - Scan, Triage & Fix

on:
  # Run daily at 9am UTC
  schedule:
    - cron: '0 9 * * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  # Step 1: Manager scans the site and creates labeled issues
  manager:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Configure git for dashboard commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Manager Agent
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Use the backlog manager skill to triage this repository.

            1. Read .claude/skills/backlog-manager.md to understand your job
            2. Read CLAUDE.md to understand the project guardrails
            3. Fetch ALL existing GitHub Issues (open AND closed) and review their titles and bodies
            4. Build a checklist of every problem already tracked — you will use this to avoid duplicates
            5. Scan demo/index.html for all bugs, accessibility issues, and code quality problems
            6. For each problem found, check your list: if ANY existing issue covers the same HTML element or line of code, skip it — even if your title would be worded differently
            7. Create a GitHub Issue only for genuinely new problems, with the correct labels applied
            8. Do NOT modify any files — only create and label issues

            Work through the file systematically from top to bottom. Be thorough but do NOT create duplicates.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Read,Glob,Grep,mcp__github__list_issues,mcp__github__search_issues,mcp__github__create_issue,mcp__github__get_label"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Read",
                  "Glob",
                  "Grep",
                  "ToolSearch",
                  "mcp__github__list_issues",
                  "mcp__github__search_issues",
                  "mcp__github__create_issue",
                  "mcp__github__get_label"
                ]
              }
            }
          show_full_output: true
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Verify manager succeeded
        run: |
          python3 -c "
          import json
          with open('/home/runner/work/_temp/claude-execution-output.json') as f:
              for line in f:
                  try:
                      d = json.loads(line)
                      if d.get('type') == 'result' and d.get('is_error'):
                          print('::error::Manager agent failed — check logs above')
                          exit(1)
                  except: pass
          "

      - name: Log manager run to dashboard
        if: always()
        run: |
          LOG="/home/runner/work/_temp/claude-execution-output.json"
          if [ ! -f "$LOG" ]; then echo "No output file found"; exit 0; fi

          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git pull origin master --rebase || true

          python3 << 'PYEOF'
          import json, sys
          from datetime import datetime, timezone

          log_path = "/home/runner/work/_temp/claude-execution-output.json"
          dashboard_path = "demo/dashboard-data.json"

          model = "unknown"
          result = None

          with open(log_path) as f:
              for line in f:
                  try:
                      d = json.loads(line)
                  except:
                      continue
                  if d.get("type") == "system" and d.get("subtype") == "init":
                      model = d.get("model", "unknown")
                  if d.get("type") == "result":
                      result = d

          if result is None:
              print("WARNING: No result object found in output log")
              print(f"Log file size: {open(log_path).read().__len__()} bytes")
              sys.exit(0)

          usage = result.get("usage", {})
          input_tokens = (
              usage.get("input_tokens", 0)
              + usage.get("cache_read_input_tokens", 0)
              + usage.get("cache_creation_input_tokens", 0)
          )
          output_tokens = usage.get("output_tokens", 0)
          cost = result.get("total_cost_usd", 0)
          is_error = result.get("is_error", False)
          summary = (result.get("result", "") or "")[:120].replace("\n", " ")

          print(f"Parsed: model={model}, cost={cost}, in={input_tokens}, out={output_tokens}, error={is_error}")

          entry = {
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "agent": "manager",
              "model": model,
              "cost_usd": float(cost),
              "input_tokens": int(input_tokens),
              "output_tokens": int(output_tokens),
              "success": not is_error,
              "summary": summary,
          }

          with open(dashboard_path, "r") as f:
              data = json.load(f)
          data.append(entry)
          with open(dashboard_path, "w") as f:
              json.dump(data, f, indent=2)

          print(f"Dashboard updated with manager entry")
          PYEOF

          git add demo/dashboard-data.json
          git commit -m "Update dashboard: manager run $(date -u +%Y-%m-%d)" || true
          git push origin master || true

  # Step 2: Worker picks up agent-ready issues and opens PRs
  # Only runs after the manager finishes successfully
  worker:
    needs: manager
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Configure git for dashboard commits
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run Worker Agent
        uses: anthropics/claude-code-action@v1
        with:
          prompt: |
            Use the worker skill to fix agent-ready issues in this repository.

            1. Read .claude/skills/worker.md to understand your workflow
            2. Read CLAUDE.md to understand the project guardrails
            3. Query GitHub Issues for open issues labeled "agent:ready" and "risk:low"
            4. For each issue (maximum 3):
               a. Read the issue details and note its current labels
               b. FIRST: Claim the issue using mcp__github__issue_write — set labels to replace "agent:ready" with "agent:in-progress" while keeping all other labels. Do NOT skip this step.
               c. Create a branch from master (fix/issue-{number}-{short-description})
               d. Implement the fix — only modify files in demo/
               e. Review your own diff to make sure it's correct and minimal
               f. Open a pull request targeting master with "Fixes #{number}" in the body
               g. Comment on the original issue with a link to the PR
            5. Work on issues one at a time, sequentially

            IMPORTANT: Never push to master. Always use branches and PRs.
            IMPORTANT: You MUST claim each issue (step 4b) before writing any code.
          claude_args: |
            --model claude-sonnet-4-6
            --allowedTools "Read,Edit,Write,Glob,Grep,Bash(git checkout -b *),Bash(git add *),Bash(git commit *),Bash(git push *),Bash(git diff *),Bash(git status),mcp__github__list_issues,mcp__github__issue_read,mcp__github__issue_write,mcp__github__create_issue,mcp__github__add_issue_comment,mcp__github__create_pull_request,mcp__github__create_branch,mcp__github__push_files"
          settings: |
            {
              "permissions": {
                "allow": [
                  "Read",
                  "Edit",
                  "Write",
                  "Glob",
                  "Grep",
                  "ToolSearch",
                  "Bash(git checkout -b *)",
                  "Bash(git add *)",
                  "Bash(git commit *)",
                  "Bash(git push *)",
                  "Bash(git diff *)",
                  "Bash(git status)",
                  "mcp__github__list_issues",
                  "mcp__github__issue_read",
                  "mcp__github__issue_write",
                  "mcp__github__create_issue",
                  "mcp__github__add_issue_comment",
                  "mcp__github__create_pull_request",
                  "mcp__github__create_branch",
                  "mcp__github__push_files"
                ]
              }
            }
          show_full_output: true
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Verify worker succeeded
        run: |
          python3 -c "
          import json
          with open('/home/runner/work/_temp/claude-execution-output.json') as f:
              for line in f:
                  try:
                      d = json.loads(line)
                      if d.get('type') == 'result' and d.get('is_error'):
                          print('::error::Worker agent failed — check logs above')
                          exit(1)
                  except: pass
          "

      - name: Log worker run to dashboard
        if: always()
        run: |
          LOG="/home/runner/work/_temp/claude-execution-output.json"
          if [ ! -f "$LOG" ]; then echo "No output file found"; exit 0; fi

          git remote set-url origin "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"
          git pull origin master --rebase || true

          python3 << 'PYEOF'
          import json, sys
          from datetime import datetime, timezone

          log_path = "/home/runner/work/_temp/claude-execution-output.json"
          dashboard_path = "demo/dashboard-data.json"

          model = "unknown"
          result = None

          with open(log_path) as f:
              for line in f:
                  try:
                      d = json.loads(line)
                  except:
                      continue
                  if d.get("type") == "system" and d.get("subtype") == "init":
                      model = d.get("model", "unknown")
                  if d.get("type") == "result":
                      result = d

          if result is None:
              print("WARNING: No result object found in output log")
              print(f"Log file size: {open(log_path).read().__len__()} bytes")
              sys.exit(0)

          usage = result.get("usage", {})
          input_tokens = (
              usage.get("input_tokens", 0)
              + usage.get("cache_read_input_tokens", 0)
              + usage.get("cache_creation_input_tokens", 0)
          )
          output_tokens = usage.get("output_tokens", 0)
          cost = result.get("total_cost_usd", 0)
          is_error = result.get("is_error", False)
          summary = (result.get("result", "") or "")[:120].replace("\n", " ")

          print(f"Parsed: model={model}, cost={cost}, in={input_tokens}, out={output_tokens}, error={is_error}")

          entry = {
              "timestamp": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "agent": "worker",
              "model": model,
              "cost_usd": float(cost),
              "input_tokens": int(input_tokens),
              "output_tokens": int(output_tokens),
              "success": not is_error,
              "summary": summary,
          }

          with open(dashboard_path, "r") as f:
              data = json.load(f)
          data.append(entry)
          with open(dashboard_path, "w") as f:
              json.dump(data, f, indent=2)

          print(f"Dashboard updated with worker entry")
          PYEOF

          git add demo/dashboard-data.json
          git commit -m "Update dashboard: worker run $(date -u +%Y-%m-%d)" || true
          git push origin master || true
