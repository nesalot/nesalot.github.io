name: Manager Loop - Scan & Triage

on:
  # Run daily at 9am UTC
  schedule:
    - cron: '0 9 * * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

jobs:
  manager:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Manager Agent
        uses: anthropics/claude-code-action@v1
        with:
          model: "claude-sonnet-4-20250514"
          prompt: |
            Use the backlog manager skill to triage this repository.

            1. Read .claude/skills/backlog-manager.md to understand your job
            2. Read CLAUDE.md to understand the project guardrails
            3. Check existing open issues to avoid creating duplicates
            4. Scan demo/index.html for all bugs, accessibility issues, and code quality problems
            5. Create a GitHub Issue for each problem found, with the correct labels applied
            6. Do NOT modify any files — only create and label issues

            Work through the file systematically from top to bottom. Be thorough.
          allowed_tools: |
            Read
            Glob
            Grep
            mcp__github__list_issues
            mcp__github__issue_write
            mcp__github__get_label
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
