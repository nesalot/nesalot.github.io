<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Loop Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #282c34;
            font-family: JetBrains Mono, monospace;
            color: #abb2bf;
            min-height: 100vh;
            padding: 40px 24px;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 40px;
            padding-bottom: 16px;
            border-bottom: 1px solid #3e4451;
        }

        .header h1 {
            font-size: 18px;
            color: #e4bb68;
            font-weight: 500;
        }

        .header p {
            font-size: 12px;
            color: #5c6370;
            margin-top: 6px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #21252b;
            border: 1px solid #3e4451;
            border-radius: 6px;
            padding: 18px;
            text-align: center;
        }

        .stat-card .value {
            font-size: 24px;
            color: #e4bb68;
            font-weight: 700;
        }

        .stat-card .label {
            font-size: 10px;
            color: #5c6370;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .section-title {
            font-size: 13px;
            color: #c678dd;
            margin-bottom: 14px;
            font-weight: 500;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        th {
            text-align: left;
            font-size: 10px;
            color: #5c6370;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 12px;
            border-bottom: 1px solid #3e4451;
        }

        td {
            font-size: 12px;
            padding: 10px 12px;
            border-bottom: 1px solid #2c313a;
            color: #abb2bf;
        }

        tr:hover td {
            background: #2c313a;
        }

        .cost { color: #e4bb68; }
        .tokens { color: #61afef; }
        .success { color: #98c379; }
        .failure { color: #e06c75; }

        .badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            display: inline-block;
        }

        .badge-manager { background: #2a2a3a; color: #c678dd; border: 1px solid #3a3a4a; }
        .badge-worker { background: #2a3a2a; color: #98c379; border: 1px solid #3a4a3a; }

        .summary-list {
            font-size: 11px;
            color: #5c6370;
            line-height: 1.6;
            max-width: 400px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #5c6370;
            font-size: 13px;
        }

        .empty-state .icon {
            font-size: 32px;
            margin-bottom: 12px;
            color: #3e4451;
        }

        .refresh-note {
            font-size: 10px;
            color: #3e4451;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Agent Loop Dashboard</h1>
            <p>Tracking autonomous agent runs on nesalot.github.io</p>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="value" id="total-runs">-</div>
                <div class="label">Total Runs</div>
            </div>
            <div class="stat-card">
                <div class="value" id="total-cost">-</div>
                <div class="label">Total Cost</div>
            </div>
            <div class="stat-card">
                <div class="value" id="total-tokens">-</div>
                <div class="label">Total Tokens</div>
            </div>
            <div class="stat-card">
                <div class="value" id="success-rate">-</div>
                <div class="label">Success Rate</div>
            </div>
        </div>

        <div class="section-title">Run History</div>
        <div id="runs-table"></div>

        <div class="refresh-note">Data updates after each agent loop run.</div>
    </div>

    <script>
        async function loadData() {
            try {
                const resp = await fetch('dashboard-data.json?' + Date.now());
                if (!resp.ok) throw new Error('No data yet');
                const runs = await resp.json();

                if (!runs.length) throw new Error('Empty');

                const totalRuns = runs.length;
                const totalCost = runs.reduce((s, r) => s + (r.cost_usd || 0), 0);
                const totalTokens = runs.reduce((s, r) => s + (r.input_tokens || 0) + (r.output_tokens || 0), 0);
                const successes = runs.filter(r => r.success).length;

                document.getElementById('total-runs').textContent = totalRuns;
                document.getElementById('total-cost').textContent = '$' + totalCost.toFixed(2);
                document.getElementById('total-tokens').textContent = totalTokens > 1000 ? (totalTokens / 1000).toFixed(1) + 'k' : totalTokens;
                document.getElementById('success-rate').textContent = Math.round((successes / totalRuns) * 100) + '%';

                let html = '<table><thead><tr>';
                html += '<th>Date</th><th>Agent</th><th>Model</th><th>Cost</th><th>Tokens</th><th>Status</th><th>Summary</th>';
                html += '</tr></thead><tbody>';

                runs.slice().reverse().forEach(r => {
                    const date = new Date(r.timestamp).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                    const badge = r.agent === 'manager' ? 'badge-manager' : 'badge-worker';
                    const status = r.success ? '<span class="success">pass</span>' : '<span class="failure">fail</span>';
                    const tokens = (r.input_tokens || 0) + (r.output_tokens || 0);
                    const tokenStr = tokens > 1000 ? (tokens / 1000).toFixed(1) + 'k' : tokens;

                    html += '<tr>';
                    html += '<td>' + date + '</td>';
                    html += '<td><span class="badge ' + badge + '">' + (r.agent || 'unknown') + '</span></td>';
                    html += '<td>' + (r.model || '-') + '</td>';
                    html += '<td class="cost">$' + (r.cost_usd || 0).toFixed(4) + '</td>';
                    html += '<td class="tokens">' + tokenStr + '</td>';
                    html += '<td>' + status + '</td>';
                    html += '<td class="summary-list">' + (r.summary || '-') + '</td>';
                    html += '</tr>';
                });

                html += '</tbody></table>';
                document.getElementById('runs-table').innerHTML = html;

            } catch (e) {
                document.getElementById('runs-table').innerHTML =
                    '<div class="empty-state">' +
                    '<div class="icon">[ ]</div>' +
                    '<p>No runs recorded yet.</p>' +
                    '<p>Trigger the Agent Loop workflow to see data here.</p>' +
                    '</div>';
            }
        }

        loadData();
    </script>
</body>
</html>
